    <meta property="og:site_name" content="NC Root Finder">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Root Finding Calculator — Step-by-Step Solutions">
    <meta name="twitter:description" content="Free online root finding calculator with detailed step-by-step iteration tables and convergence graphs.">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4361ee">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Root Finder">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Root Finding Calculator",
        "url": "https://nc.arose-niazi.me/roots/",
        "description": "Free online root finding calculator with step-by-step solutions. Supports Bisection, Regula Falsi, Newton-Raphson, and Secant methods with convergence graphs.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Arose Niazi", "url": "https://arose-niazi.me" },
        "educationalLevel": "University",
        "about": {
            "@type": "Thing",
            "name": "Root Finding Methods",
            "description": "Numerical methods for finding roots of nonlinear equations"
        }
    }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=1">

    <!-- Math.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js" defer></script>
    <!-- App -->
    <script src="app.js?v=1" defer></script>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Root Finder<span>Calculator</span></h1>
            <div class="header-actions">
                <button id="history-toggle-btn" type="button" aria-label="Toggle history panel">History</button>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="primary-area">

            <!-- Input Card -->
            <section class="card" aria-label="Equation input">
                <h2 class="card-title">Equation Input</h2>

                <!-- Equation -->
                <div class="equation-input-group">
                    <label for="equation-input">f(x) =</label>
                    <input type="text" id="equation-input" class="equation-input" placeholder="e.g. x^3 - x - 2, sin(x) - x/2, exp(-x) - x" autocomplete="off" spellcheck="false">
                    <div class="equation-hint">Use <code>x</code> as variable. Supports: <code>^</code>, <code>sqrt()</code>, <code>sin()</code>, <code>cos()</code>, <code>tan()</code>, <code>log()</code>, <code>exp()</code>, <code>abs()</code>, <code>pi</code>, <code>e</code></div>
                </div>

                <!-- Controls -->
                <div class="controls-row">
                    <div class="control-group">
                        <label for="method-select">Method</label>
                        <select id="method-select">
                            <option value="bisection">Bisection</option>
                            <option value="regulafalsi">Regula Falsi</option>
                            <option value="newton">Newton-Raphson</option>
                            <option value="secant">Secant</option>
                        </select>
                    </div>

                    <div class="control-group" id="interval-a-group">
                        <label for="interval-a">a (lower bound)</label>
                        <input type="number" id="interval-a" class="num-input" step="any" placeholder="e.g. 1" value="">
                    </div>

                    <div class="control-group" id="interval-b-group">
                        <label for="interval-b">b (upper bound)</label>
                        <input type="number" id="interval-b" class="num-input" step="any" placeholder="e.g. 2" value="">
                    </div>

                    <div class="control-group" id="x0-group" style="display:none;">
                        <label for="x0-input">x₀ (initial guess)</label>
                        <input type="number" id="x0-input" class="num-input" step="any" placeholder="e.g. 1.5" value="">
                    </div>

                    <div class="control-group" id="x1-group" style="display:none;">
                        <label for="x1-input">x₁ (second guess)</label>
                        <input type="number" id="x1-input" class="num-input" step="any" placeholder="e.g. 2" value="">
                    </div>

                    <div class="control-group">
                        <label for="precision-input">Decimal Places</label>
                        <input type="number" id="precision-input" class="num-input" min="1" max="15" value="6" step="1">
                    </div>

                    <div class="control-group">
                        <label for="max-iter-input">Max Iterations</label>
                        <input type="number" id="max-iter-input" class="num-input" min="1" max="200" value="50" step="1">
                    </div>

                    <div class="control-group">
                        <label for="tolerance-input">Tolerance (ε)</label>
                        <input type="text" id="tolerance-input" class="num-input" value="0.00001" placeholder="e.g. 0.00001">
                    </div>
                </div>

                <div id="method-note" class="method-note"></div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button id="calculate-btn" class="btn btn-primary" type="button">Find Root</button>
                    <button id="example-btn" class="btn btn-secondary" type="button">Example</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear Output</button>
                </div>

                <p class="tip-text">
                    Tip: Press <kbd>Ctrl+Enter</kbd> to calculate
                </p>
            </section>

            <!-- Output -->
            <section id="output" aria-label="Calculation results"></section>
        </div>

        <!-- History Panel -->
        <aside id="history-panel">
            <div class="card">
                <h2 class="card-title">
                    History
                    <button id="clear-history-btn" class="btn btn-small btn-secondary" type="button">Clear</button>
                </h2>
                <div id="history-list"></div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <span>&copy; 2022&ndash;2026 Arose Niazi</span>
            <nav class="footer-links" aria-label="Footer links">
                <a href="https://nc.arose-niazi.me/">NC Suite</a>
                <a href="https://github.com/Arose-Niazi/nc-roots-finder" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://arose-niazi.me" target="_blank" rel="noopener noreferrer">Author</a>
            </nav>
        </div>
    </footer>

</body>
</html>
